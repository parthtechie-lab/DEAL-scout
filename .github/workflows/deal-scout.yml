name: Deal Scout v2

# ── Schedule ────────────────────────────────────────────────────────────────
# NOTE ON FREE TIER (honest math):
#   • Public repo  → Actions minutes are UNLIMITED and free. No concern.
#   • Private repo → 2,000 free min/month.
#     - Coupon scan (15-min cron, ~30s each): 96 runs/day × 0.5 min = 48 min/day
#     - Full scan   (60-min cron, ~3-4 min each, NO Playwright): 24 runs/day × 4 min = 96 min/day
#     - Monthly total ≈ (48 + 96) × 30 = 4,320 min/month → over limit for private repos.
#     → RECOMMENDATION: Make the repo public, or run full scan every 2 hours (24 × 4 × 30 = 2,880 min/month)
#
# Playwright is NOT installed or run in the scheduled cron.
# It is only available on `workflow_dispatch` (manual trigger) to keep minutes low.

on:
  schedule:
    # Coupon-only scan every 15 minutes (pure Python, ~30 sec per run)
    - cron: "*/15 * * * *"
    # Full scan (Telegram + Reddit + Coupon) every 60 minutes — NO Playwright
    - cron: "0 * * * *"
    # Weekly bank offer check — Monday 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      run_playwright:
        description: "Run Playwright scrapers (price checker + deep food scraper)?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read  # Read-only — DB is now stored in Actions cache, NOT committed to repo

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Restore DB from cache (avoids binary blobs in git history) ──────────
      - name: Restore deal database from cache
        uses: actions/cache@v4
        with:
          path: data/deals.db
          key: deals-db-${{ github.run_id }}
          restore-keys: |
            deals-db-

      - name: Install dependencies (no Playwright for scheduled runs)
        run: pip install -r requirements.txt

      - name: Install Playwright (manual trigger only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_playwright == 'true'
        run: playwright install --with-deps chromium

      # ── Determine which mode to run ─────────────────────────────────────────
      - name: Determine run mode
        id: mode
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          EVENT="${{ github.event_name }}"

          if [ "$SCHEDULE" = "*/15 * * * *" ]; then
            echo "mode=coupon_only"    >> "$GITHUB_OUTPUT"
          elif [ "$SCHEDULE" = "0 3 * * 1" ]; then
            echo "mode=bank_check"    >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            echo "mode=manual"        >> "$GITHUB_OUTPUT"
          else
            echo "mode=full_scan"     >> "$GITHUB_OUTPUT"
          fi

      # ── Coupon-only path (15-min cron) ──────────────────────────────────────
      - name: Run Instant Coupon Detector
        if: steps.mode.outputs.mode == 'coupon_only'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import sys; sys.path.insert(0,'scripts')
          from db import init_db; init_db()
          import coupon_detector; coupon_detector.run()
          "

      # ── Full scan path (hourly cron) ────────────────────────────────────────
      - name: Run Deal Scout (Telegram + Reddit + Coupon, no Playwright)
        if: steps.mode.outputs.mode == 'full_scan'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_API_ID:    ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH:  ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION:   ${{ secrets.TELEGRAM_SESSION }}
          SKIP_PLAYWRIGHT:    "true"
        run: python scripts/run_all.py

      # ── Bank check path (weekly Monday) ─────────────────────────────────────
      - name: Run Bank Offer Check
        if: steps.mode.outputs.mode == 'bank_check'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_BANK_CHECK:     "true"
        run: |
          python -c "
          import sys; sys.path.insert(0,'scripts')
          from db import init_db; init_db()
          import bank_offers; bank_offers.run()
          "

      # ── Manual/full scan with optional Playwright ────────────────────────────
      - name: Run Full Deal Scout (manual, optional Playwright)
        if: steps.mode.outputs.mode == 'manual'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_API_ID:    ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH:  ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION:   ${{ secrets.TELEGRAM_SESSION }}
          RUN_BANK_CHECK:     "false"
          SKIP_PLAYWRIGHT:    ${{ github.event.inputs.run_playwright == 'true' && 'false' || 'true' }}
        run: python scripts/run_all.py

      # ── Send health-check failure alert ─────────────────────────────────────
      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import os, requests
          token = os.environ.get('TELEGRAM_BOT_TOKEN','')
          chat  = os.environ.get('TELEGRAM_CHAT_ID','')
          if not token or not chat: exit()
          requests.post(
            f'https://api.telegram.org/bot{token}/sendMessage',
            data={
              'chat_id': chat,
              'text': '⚠️ <b>Deal Scout run FAILED</b>\nCheck the GitHub Actions log:\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              'parse_mode': 'HTML'
            }, timeout=10
          )
          "

      # ── Save DB back to cache ────────────────────────────────────────────────
      # DB is cached, not committed. This keeps git history clean.
      # The cache key includes run_id so each run saves its own snapshot.
      # actions/cache@v4 automatically restores from the most recent matching key.
